name: Build Flutter Linux App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      # 删除不稳定的 Flutter SDK 缓存步骤，让 flutter-action 自行管理
      # 改为只缓存 pub 依赖，这是最有效的缓存

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        id: setup-flutter
        with:
          channel: stable
          cache: true
          cache-key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          # flutter-action 会自动处理缓存路径

      - name: Get Flutter SDK version
        id: flutter-version
        run: |
          FLUTTER_VERSION=$(flutter --version | head -n 1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "flutter_version=${FLUTTER_VERSION}" >> $GITHUB_OUTPUT

      - name: Cache Flutter SDK (备用)
        uses: actions/cache@v4
        id: flutter-sdk-cache
        with:
          # GitHub 运行器中 Flutter SDK 的标准安装路径
          path: ${{ github.workspace }}/_flutter
          # 使用 Flutter 版本作为缓存键的一部分
          key: ${{ runner.os }}-flutter-${{ steps.flutter-version.outputs.flutter_version }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release

      - name: Upload Linux build files
        uses: actions/upload-artifact@v4
        with:
          name: flutter-linux-app
          path: build/linux/x64/release/bundle/
          retention-days: 7