name: Build Flutter Linux App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: extract_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Linux app
        run: flutter build linux --release

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Build packages with Fastforge
        run: fastforge build --name production

      - name: Rename AppImage
        run: |
          APPIMAGE_FILE=$(ls build/linux/x64/release/*.AppImage)
          mv "$APPIMAGE_FILE" "build/linux/x64/release/OncePower-v${{ steps.extract_version.outputs.version }}-Linux.AppImage"

      - name: Rename DEB
        run: |
          DEB_FILE=$(ls build/linux/x64/release/*.deb)
          mv "$DEB_FILE" "build/linux/x64/release/OncePower-v${{ steps.extract_version.outputs.version }}-Linux.deb"

      - name: Rename RPM
        run: |
          RPM_FILE=$(ls build/linux/x64/release/*.rpm)
          mv "$RPM_FILE" "build/linux/x64/release/OncePower-v${{ steps.extract_version.outputs.version }}-Linux.rpm"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/linux/x64/release/*.AppImage
          retention-days: 7

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: build/linux/x64/release/*.deb
          retention-days: 7

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: build/linux/x64/release/*.rpm
          retention-days: 7

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.extract_version.outputs.version }}
          release_name: Release v${{ steps.extract_version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload AppImage to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/linux/x64/release/*.AppImage
          asset_name: OncePower-v${{ steps.extract_version.outputs.version }}-Linux.AppImage
          asset_content_type: application/octet-stream

      - name: Upload DEB to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/linux/x64/release/*.deb
          asset_name: OncePower-v${{ steps.extract_version.outputs.version }}-Linux.deb
          asset_content_type: application/vnd.debian.binary-package

      - name: Upload RPM to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/linux/x64/release/*.rpm
          asset_name: OncePower-v${{ steps.extract_version.outputs.version }}-Linux.rpm
          asset_content_type: application/x-rpm
