name: Build Flutter Linux App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 给权限（解决 Release 创建失败）
permissions:
  contents: write

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache APT dependencies
        uses: actions/cache@v4
        with:
          path: /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/*.yml') }}

      - name: Install Linux dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update -y
          sudo apt-get install -y \
            libfuse2 \
            ninja-build \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            locate \
            rpm \
            patchelf \
            libpulse0 \
            libc++1 \
            libgl1 \
            libblkid-dev \
            liblzma-dev \
            libstdc++-12-dev

      - name: Install appimagetool
        run: |
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install fastforge
        run: dart pub global activate fastforge

      # 一次打包全部格式
      - name: Build all packages
        run: fastforge package --platform linux --targets appimage,deb,rpm

      # 把所有包移动到 dist 根目录（解决找不到文件）
      - name: Collect packages to dist/
        run: |
          find dist/ -name "*.AppImage" -exec mv {} dist/ \;
          find dist/ -name "*.deb" -exec mv {} dist/ \;
          find dist/ -name "*.rpm" -exec mv {} dist/ \;

      # 重命名（安全版）
      - name: Rename AppImage
        run: |
          FILE=$(ls dist/*.AppImage | head -1)
          if [ -n "$FILE" ]; then
            mv "$FILE" "dist/OncePower-v${{ steps.extract_version.outputs.version }}-Linux.AppImage"
          fi
        continue-on-error: true

      - name: Rename DEB
        run: |
          FILE=$(ls dist/*.deb | head -1)
          if [ -n "$FILE" ]; then
            mv "$FILE" "dist/OncePower-v${{ steps.extract_version.outputs.version }}-Linux.deb"
          fi
        continue-on-error: true

      - name: Rename RPM
        run: |
          FILE=$(ls dist/*.rpm | head -1)
          if [ -n "$FILE" ]; then
            mv "$FILE" "dist/OncePower-v${{ steps.extract_version.outputs.version }}-Linux.rpm"
          fi
        continue-on-error: true

      # 上传产物
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          retention-days: 7

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          retention-days: 7

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: dist/*.rpm
          retention-days: 7

      # 创建 Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage dist/*.deb dist/*.rpm
          tag_name: v${{ steps.extract_version.outputs.version }}
          name: Release v${{ steps.extract_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}