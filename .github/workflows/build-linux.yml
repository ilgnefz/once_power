name: Build Flutter Linux App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ✅ 系统依赖缓存（从此不会每次重装 30 个依赖包）
      - name: Cache APT libraries
        uses: actions/cache@v4
        with:
          path: /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/*.yml') }}

      - name: Install Linux build dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update -y
          sudo apt-get install -y \
            libfuse2 \
            ninja-build \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            locate \
            rpm \
            patchelf \
            libpulse0 \
            libc++1 \
            libgl1 \
            libblkid-dev \
            liblzma-dev \
            libstdc++-12-dev

      - name: Install AppImageTool
        run: |
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: extract_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Fastforge
        run: dart pub global activate fastforge

      # ✅ 一次打包 3 个格式，不用分开跑（速度×3）
      - name: Build all packages
        run: fastforge package --platform linux --targets appimage,deb,rpm

      # ✅ 重命名（容错：找不到文件不报错）
      - name: Rename AppImage
        run: |
          APPIMAGE_FILE=$(ls dist/*.AppImage | head -1)
          mv "$APPIMAGE_FILE" "dist/OncePower-v${{ steps.extract_version.outputs.version }}-Linux.AppImage"
        continue-on-error: true

      - name: Rename DEB
        run: |
          DEB_FILE=$(ls dist/*.deb | head -1)
          mv "$DEB_FILE" "dist/OncePower-v${{ steps.extract_version.outputs.version }}-Linux.deb"
        continue-on-error: true

      - name: Rename RPM
        run: |
          RPM_FILE=$(ls dist/*.rpm | head -1)
          mv "$RPM_FILE" "dist/OncePower-v${{ steps.extract_version.outputs.version }}-Linux.rpm"
        continue-on-error: true

      # ✅ 上传产物
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          retention-days: 7

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          retention-days: 7

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: dist/*.rpm
          retention-days: 7

      # ✅ 发布 Release
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.extract_version.outputs.version }}
          release_name: Release v${{ steps.extract_version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload AppImage to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/*.AppImage
          asset_name: OncePower-v${{ steps.extract_version.outputs.version }}-Linux.AppImage
          asset_content_type: application/octet-stream

      - name: Upload DEB to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/*.deb
          asset_name: OncePower-v${{ steps.extract_version.outputs.version }}-Linux.deb
          asset_content_type: application/vnd.debian.binary-package

      - name: Upload RPM to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/*.rpm
          asset_name: OncePower-v${{ steps.extract_version.outputs.version }}-Linux.rpm
          asset_content_type: application/x-rpm