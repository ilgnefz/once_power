releases:
  - name: linux
    jobs:
      - name: linux-appimage
        package:
          platform: linux
          target: appimage
          build_args:
            target-platform: linux-x64
      - name: linux-deb
        package:
          platform: linux
          target: deb
          build_args:
            target-platform: linux-x64
